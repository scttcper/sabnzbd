name: Release
on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

permissions:
  contents: write
  deployments: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: NPM Release
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: wyvox/action-setup-pnpm@v3
        with:
          node-version: 24

      - name: Update npm
        run: npm install -g npm@latest

      - run: pnpm run build

      - name: Release
        run: npx semantic-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
